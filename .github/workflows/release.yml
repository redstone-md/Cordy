name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the release
  id-token: write   # cosign keyless signing (OIDC)

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: macos-13,       target: x86_64-apple-darwin }
          - { os: macos-14,       target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          name="cordy-${tag}-${{ matrix.target }}"
          staging="$name"
          mkdir "$staging"
          cp README.md README.ru.md LICENSE CHANGELOG.md "$staging"/
          if [ "${RUNNER_OS}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/cordy.exe" "$staging"/
            7z a "$name.zip" "$staging" >/dev/null
            echo "ASSET=$name.zip" >> "$GITHUB_ENV"
          else
            cp "target/${{ matrix.target }}/release/cordy" "$staging"/
            tar czf "$name.tar.gz" "$staging"
            echo "ASSET=$name.tar.gz" >> "$GITHUB_ENV"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for the changelog

      - name: Collect artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum cordy-* > SHA256SUMS
          cat SHA256SUMS

      - name: Sign checksums (cosign, keyless)
        uses: sigstore/cosign-installer@v3
      - run: |
          cd artifacts
          cosign sign-blob --yes SHA256SUMS \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/cordy-*
            artifacts/SHA256SUMS
            artifacts/SHA256SUMS.sig
            artifacts/SHA256SUMS.pem
          fail_on_unmatched_files: true
